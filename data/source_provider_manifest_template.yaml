    online_required: true
    license_required: terms_to_confirm
    intended_use: SGE Au99.99 or Ag reference candidate
    symbols:
      - Au99.99
      - Ag99.99
    fields:
      - date
      - close
      - unit
    notes: candidate only; do not implement scraper in Phase 4B-0
