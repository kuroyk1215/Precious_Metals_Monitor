  csv_log: precious_metals_signal_log.csv
  markdown_report: reports/latest_report.md
  ibkr_smoke_csv: ibkr_smoke_log.csv
  ibkr_smoke_report: reports/ibkr_smoke_report.md
  model_calibration_json: reports/model_calibration.json
  model_calibration_report: reports/model_calibration.md
  upstream_factor_snapshot_csv: upstream_factor_snapshot.csv
  upstream_factor_report: reports/upstream_factor_report.md
  theoretical_price_snapshot_csv: theoretical_price_snapshot.csv
  theoretical_price_report: reports/theoretical_price_report.md
  actual_etf_price_snapshot_csv: actual_etf_price_snapshot.csv
  actual_etf_price_report: reports/actual_etf_price_report.md
  deviation_snapshot_csv: deviation_snapshot.csv
  deviation_report: reports/deviation_report.md
  reference_signal_snapshot_csv: reference_signal_snapshot.csv
  reference_signal_report: reports/reference_signal_report.md
  daily_trade_plan_snapshot_csv: daily_trade_plan_snapshot.csv
  daily_trade_plan_report: reports/daily_trade_plan_report.md
  multi_horizon_strategy_snapshot_csv: multi_horizon_strategy_snapshot.csv
