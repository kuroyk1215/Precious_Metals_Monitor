  delayed_data_trade_threshold_deviation_pct: 1.5

model:
  shanghai_gold_premium_pct: 0.8
  historical_premium_discount_pct:
    518880.SH: 0.2
    1540.T: 0.1
    1542.T: 0.1
  etf_conversion_factor:
    1540.T: 0.1
    1542.T: 0.1
