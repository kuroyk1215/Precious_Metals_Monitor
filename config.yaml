  manual_research_pipeline_summary_csv: manual_research_pipeline_summary.csv
  manual_research_pipeline_report: reports/manual_research_pipeline_report.md
  timezone:
    jst: Asia/Tokyo
    cst: Asia/Shanghai
    et: America/New_York

